kind = "web"
previewPath = "/"
title = "ReMynd Assessment Operating System"
version = "1.0.0"
id = "artifacts/raos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18591

[services.development]
run = "pnpm --filter @workspace/raos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/raos", "run", "build" ]
publicDir = "artifacts/raos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18591"
BASE_PATH = "/"
